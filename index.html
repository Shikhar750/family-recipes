<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf7f2; --surface: #ffffff; --accent: #c84b2f;
      --accent-light: #fdf0ed; --text: #1a1208; --muted: #8a7f72;
      --border: #e8e0d5; --tag-bg: #f3ede4;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* AUTH SCREEN */
    #authScreen {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .auth-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 380px;
    }
    .auth-logo { font-family: 'Lora', serif; font-size: 26px; font-weight: 600; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; background: none; border: none; color: var(--muted); transition: all 0.15s; }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .auth-form input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
    .auth-form input:focus { border-color: var(--accent); }
    .auth-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-err { font-size: 13px; color: var(--accent); text-align: center; display: none; margin-top: 4px; }
    .auth-err.show { display: block; }

    /* APP */
    #app { display: none; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 20px 0; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .logo-text { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; }
    .logo-sub { font-size: 12px; color: var(--muted); margin-left: 8px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-name { font-size: 13px; color: var(--muted); }
    .signout-btn { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; }
    .signout-btn:hover { border-color: var(--accent); color: var(--accent); }
    .add-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #searchInput { width: 100%; padding: 11px 12px 11px 36px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    .chips-wrap { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
    .chips-wrap::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    main { padding: 20px 16px 80px; max-width: 480px; margin: 0 auto; }
    .count-label { font-size: 12px; color: var(--muted); margin-bottom: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .recipe-list { display: flex; flex-direction: column; gap: 12px; }

    .recipe-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; transition: box-shadow 0.15s; cursor: pointer; }
    .recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .card-thumb { width: 100px; min-height: 90px; background: var(--tag-bg); flex-shrink: 0; position: relative; overflow: hidden; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    .play-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.65); color: #fff; border-radius: 4px; width: 22px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 8px; }
    .card-body { padding: 12px 12px 10px; flex: 1; min-width: 0; }
    .card-name { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 12px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .card-tag { background: var(--tag-bg); color: var(--muted); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; }
    .card-tag.cuisine { background: #eef3fd; color: #4a6fa5; }
    .card-tag.author { background: #f0fdf4; color: #166534; }
    .card-actions { display: flex; gap: 6px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 4px; border-radius: 6px; transition: color 0.15s, background 0.15s; line-height: 1; }
    .icon-btn:hover { color: var(--accent); background: var(--accent-light); }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .loading .spinner { font-size: 32px; margin-bottom: 12px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal h2 { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; margin-bottom: 20px; }

    .detail-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; margin-bottom: 16px; display: block; }
    .detail-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--tag-bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 16px; }
    .detail-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .detail-watch-btn { width: 100%; padding: 12px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }
    .detail-section p { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
    .detail-ingredients { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-ingredient { background: var(--tag-bg); padding: 6px 12px; border-radius: 20px; font-size: 13px; color: var(--text); }
    .detail-footer { display: flex; gap: 10px; margin-top: 20px; }
    .btn-danger { flex: 1; background: none; border: 1.5px solid #e8d5d5; color: #c84b2f; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-close { flex: 1; background: var(--tag-bg); border: none; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: var(--muted); cursor: pointer; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    label span { color: var(--muted); font-weight: 400; }
    input[type="text"], input[type="url"], textarea, select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .yt-row { display: flex; gap: 8px; align-items: flex-start; }
    .yt-row input { flex: 1; }
    .autofill-btn { flex-shrink: 0; padding: 11px 12px; background: var(--tag-bg); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .autofill-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .autofill-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .photo-area { border: 2px dashed var(--border); border-radius: 10px; padding: 18px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
    .photo-area:hover { border-color: var(--accent); background: var(--accent-light); }
    .photo-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-area .photo-icon { font-size: 24px; margin-bottom: 6px; }
    .photo-area p { font-size: 13px; color: var(--muted); }
    .photo-area p strong { color: var(--accent); }
    .photo-preview-wrap { margin-top: 10px; display: none; }
    .photo-preview-wrap.show { display: block; }
    .photo-preview-wrap img { width: 100%; border-radius: 8px; max-height: 160px; object-fit: cover; }
    .photo-extract-btn { width: 100%; margin-top: 8px; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
    .photo-extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .url-preview { margin-top: 8px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); display: none; }
    .url-preview.show { display: block; }
    .url-preview img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .url-preview-label { padding: 8px 12px; font-size: 12px; color: var(--muted); background: var(--tag-bg); }

    .ai-status { font-size: 13px; color: var(--accent); margin-top: 8px; display: none; font-weight: 500; }
    .ai-status.show { display: block; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0 14px; }
    .divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-primary { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 18px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--muted); cursor: pointer; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1208; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s ease; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-top">
      <div>
        <span class="logo-text">Recipe Book</span>
        <span class="logo-sub">by family</span>
      </div>
      <div class="header-right">
        <span class="user-name" id="userName"></span>
        <button class="signout-btn" onclick="signOut()">Sign out</button>

    </div>
    <div class="search-wrap">

    <div class="chips-wrap" id="chipsWrap"></div>

  <main>

</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addOverlay">

    <div class="form-group">

        <input type="file" accept="image/*" id="photoInput" onchange="onPhotoSelected(event)"/>

      </div>
      <div class="photo-preview-wrap" id="photoPreviewWrap">
        <img id="photoPreviewImg" src="" alt="recipe photo"/>

      </div>
      <div class="ai-status" id="photoStatus"></div>
    </div>

    <div class="divider"><span>or fill in manually</span></div>

    <div class="form-group">
      <label>Recipe Name</label>
      <input type="text" id="fName" placeholder="e.g. Butter Chicken"/>
    </div>

    <div class="form-group">
      <label>YouTube Link</label>
      <div class="yt-row">
        <input type="url" id="fUrl" placeholder="https://youtube.com/watch?v=…" oninput="onYtInput()"/>
        <button class="autofill-btn" id="autofillBtn" onclick="autofillFromYT()">✨ Auto-fill</button>
      </div>
      <div class="url-preview" id="urlPreview">
        <img id="previewImg" src="" alt="thumbnail"/>
        <div class="url-preview-label">▶ YouTube • tap thumbnail to watch</div>

      <div class="ai-status" id="ytStatus"></div>

    <div class="form-group">
      <label>Ingredients <span>(comma-separated)</span></label>
      <textarea id="fIngredients" placeholder="chicken, onion, tomato, cream…"></textarea>
    </div>

    <div class="form-group">
      <label>Written Recipe <span>(optional)</span></label>
      <textarea id="fRecipe" placeholder="1. Marinate chicken for 30 mins&#10;2. Heat butter in pan…" style="min-height:100px"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Cuisine</label>
        <select id="fCuisine">
          <option value="">— pick —</option>

          <option>Chinese</option>
          <option>Mexican</option>
          <option>Thai</option>
          <option>Middle Eastern</option>

          <option>Other</option>

      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="fCategory">
          <option value="">— pick —</option>

          <option>Dal / Lentils</option>
          <option>Rice / Biryani</option>
          <option>Bread / Roti</option>
          <option>Dessert</option>
          <option>Snack</option>

    <div class="form-actions">

</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal" id="detailModal">
    <div class="modal-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var WORKER_URL = "https://recipe-ai-proxy.guptashikhar999.workers.dev";
  var activeCuisine = "All";
  var photoBase64 = null;
  var photoMime = "image/jpeg";
  var currentTab = "login";

  // ── AUTH ──
  window.switchTab = function(tab) {
    currentTab = tab;
    document.querySelectorAll(".auth-tab").forEach(function(t, i) {
      t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
    });
    document.getElementById("authName").style.display = tab === "signup" ? "block" : "none";
    document.getElementById("authBtn").textContent = tab === "login" ? "Sign In" : "Create Account";
    document.getElementById("authErr").classList.remove("show");
  };

  window.handleAuth = function() {
    var name = document.getElementById("authName").value.trim();
    var email = document.getElementById("authEmail").value.trim();
    var password = document.getElementById("authPassword").value;
    var btn = document.getElementById("authBtn");
    var err = document.getElementById("authErr");

    if (!email || !password) { showAuthErr("Please fill in all fields"); return; }
    if (currentTab === "signup" && !name) { showAuthErr("Please enter your name"); return; }

    btn.disabled = true;
    btn.textContent = currentTab === "login" ? "Signing in…" : "Creating account…";
    err.classList.remove("show");

    var promise = currentTab === "login"
      ? window._signIn(email, password)
      : window._signUp(name, email, password);

    promise.catch(function(e) {
      var msg = e.code === "auth/user-not-found" ? "No account found with this email" :
                e.code === "auth/wrong-password" ? "Incorrect password" :
                e.code === "auth/email-already-in-use" ? "Email already registered" :
                e.code === "auth/weak-password" ? "Password must be at least 6 characters" :
                e.code === "auth/invalid-email" ? "Invalid email address" :
                e.code === "auth/invalid-credential" ? "Invalid email or password" :
                "Something went wrong. Try again.";
      showAuthErr(msg);
    }).finally(function() {
      btn.disabled = false;
      btn.textContent = currentTab === "login" ? "Sign In" : "Create Account";
    });
  };

  function showAuthErr(msg) {
    var err = document.getElementById("authErr");
    err.textContent = msg;
    err.classList.add("show");
  }

  window.signOut = function() {
    window._signOut().catch(function(e) { showToast("Error signing out"); });
  };

  // ── CHIPS ──
  function getYTId(url) {
    var m = (url||"").match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function buildChips() {
    var cuisines = ["All"];
    (window._allRecipes || []).forEach(function(r) { if (r.cuisine && cuisines.indexOf(r.cuisine) === -1) cuisines.push(r.cuisine); });
    document.getElementById("chipsWrap").innerHTML = cuisines.map(function(c) {
      return '<button class="chip' + (c === activeCuisine ? ' active' : '') + '" onclick="selectCuisine(\'' + c + '\')">' + c + '</button>';
    }).join("");
  }

  window.selectCuisine = function(c) { activeCuisine = c; buildChips(); renderRecipes(); };

  // ── RENDER ──
  function renderRecipes() {
    var recipes = window._allRecipes || [];
    var query = document.getElementById("searchInput").value.toLowerCase().trim();
    var list = document.getElementById("recipeList");
    var countLabel = document.getElementById("countLabel");

    var filtered = recipes.filter(function(r) {
      var cuisineOk = activeCuisine === "All" || r.cuisine === activeCuisine;
      var textOk = !query || (r.name||"").toLowerCase().includes(query) || (r.ingredients||"").toLowerCase().includes(query) || (r.category||"").toLowerCase().includes(query);
      return cuisineOk && textOk;
    });

    if (recipes.length === 0) {
      countLabel.textContent = "";
      list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">🥘</div><h3 style="font-family:Lora,serif;color:var(--text);margin-bottom:6px">No recipes yet</h3><p style="font-size:14px">Tap <strong>+ Add</strong> to save the first one.</p></div>';
      return;
    }

    countLabel.textContent = filtered.length + " recipe" + (filtered.length !== 1 ? "s" : "");

    if (!filtered.length) {
      list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">🔍</div><h3 style="font-family:Lora,serif;color:var(--text);margin-bottom:6px">Nothing found</h3><p style="font-size:14px">Try a different filter or search</p></div>';
      return;
    }

    list.innerHTML = filtered.map(function(r) {
      var vid = r.ytId || getYTId(r.ytUrl);
      var thumb = vid ? '<img src="https://img.youtube.com/vi/' + vid + '/hqdefault.jpg" alt="' + esc(r.name) + '"/>' : '<div class="thumb-placeholder">🍽️</div>';
      var playBadge = vid ? '<div class="play-badge">▶</div>' : '';
      return '<div class="recipe-card" onclick="openDetail(\'' + r._id + '\')">' +
        '<div class="card-thumb">' + thumb + playBadge + '</div>' +
        '<div class="card-body">' +
          '<div class="card-name">' + esc(r.name) + '</div>' +
          (r.ingredients ? '<div class="card-meta">' + esc(r.ingredients) + '</div>' : '') +
          '<div class="card-footer">' +
            '<div class="card-tags">' +
              (r.cuisine ? '<span class="card-tag cuisine">' + esc(r.cuisine) + '</span>' : '') +
              (r.category ? '<span class="card-tag">' + esc(r.category) + '</span>' : '') +
              (r.addedByName ? '<span class="card-tag author">👤 ' + esc(r.addedByName) + '</span>' : '') +
            '</div>' +
            '<div class="card-actions">' +
              '<button class="icon-btn" onclick="event.stopPropagation();deleteRecipe(\'' + r._id + '\')">🗑</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join("");
  }

  // ── DETAIL ──
  window.openDetail = function(id) {
    var r = (window._allRecipes || []).find(function(x) { return x._id === id; });
    if (!r) return;
    var vid = r.ytId || getYTId(r.ytUrl);
    var ingList = r.ingredients ? r.ingredients.split(",").map(function(i) {
      return '<span class="detail-ingredient">' + esc(i.trim()) + '</span>';
    }).join("") : "";

    document.getElementById("detailContent").innerHTML =
      (vid ? '<img class="detail-thumb" src="https://img.youtube.com/vi/' + vid + '/hqdefault.jpg" alt="' + esc(r.name) + '"/>' : '<div class="detail-thumb-placeholder">🍽️</div>') +
      '<div class="detail-title">' + esc(r.name) + '</div>' +
      '<div class="detail-tags">' +
        (r.cuisine ? '<span class="card-tag cuisine">' + esc(r.cuisine) + '</span>' : '') +
        (r.category ? '<span class="card-tag">' + esc(r.category) + '</span>' : '') +
        (r.addedByName ? '<span class="card-tag author">👤 ' + esc(r.addedByName) + '</span>' : '') +
      '</div>' +
      (vid ? '<button class="detail-watch-btn" onclick="window.open(\'' + esc(r.ytUrl) + '\',\'_blank\')">▶ Watch on YouTube</button>' : '') +
      (ingList ? '<div class="detail-section"><h3>Ingredients</h3><div class="detail-ingredients">' + ingList + '</div></div>' : '') +
      (r.recipe ? '<div class="detail-section"><h3>Steps</h3><p>' + esc(r.recipe) + '</p></div>' : '') +
      (!r.recipe && !ingList ? '<div class="detail-section"><p style="color:var(--muted);font-size:14px">No details saved for this recipe.</p></div>' : '') +
      '<div class="detail-footer">' +
        '<button class="btn-danger" onclick="deleteRecipe(\'' + r._id + '\');closeModal(\'detail\')">🗑 Delete</button>' +
        '<button class="btn-close" onclick="closeModal(\'detail\')">Close</button>' +
      '</div>';

    openModal('detail');
  };

  window.deleteRecipe = function(id) {
    if (!confirm("Delete this recipe?")) return;
    window._deleteFromFirebase(id).catch(function(e) { showToast("Error: " + e.message); });
  };

  // ── GEMINI ──
  function callGemini(parts) {
    return fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: parts }] })
    }).then(function(r) { return r.json(); });
  }

  function parseGeminiJSON(data) {
    try {
      var text = data.candidates[0].content.parts[0].text;
      text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
      return JSON.parse(text);
    } catch(e) { console.error("Gemini parse error", e, data); return {}; }
  }

  function fillForm(parsed) {
    if (parsed.name) document.getElementById("fName").value = parsed.name;
    if (parsed.ingredients) document.getElementById("fIngredients").value = parsed.ingredients;
    if (parsed.recipe) document.getElementById("fRecipe").value = parsed.recipe;
    if (parsed.category) setSelect("fCategory", parsed.category);
    if (parsed.cuisine) setSelect("fCuisine", parsed.cuisine);
  }

  function setSelect(id, value) {
    var sel = document.getElementById(id);
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value.toLowerCase() === value.toLowerCase()) { sel.selectedIndex = i; return; }
    }
    for (var j = 0; j < sel.options.length; j++) {
      if (sel.options[j].value.toLowerCase().includes(value.toLowerCase()) || value.toLowerCase().includes(sel.options[j].value.toLowerCase())) { sel.selectedIndex = j; return; }
    }
  }

  // ── YOUTUBE AUTOFILL ──
  window.onYtInput = function() {
    var url = document.getElementById("fUrl").value.trim();
    var vid = getYTId(url);
    var preview = document.getElementById("urlPreview");
    if (vid) { document.getElementById("previewImg").src = "https://img.youtube.com/vi/" + vid + "/hqdefault.jpg"; preview.classList.add("show"); }
    else { preview.classList.remove("show"); }
  };

  window.autofillFromYT = function() {
    var url = document.getElementById("fUrl").value.trim();
    var vid = getYTId(url);
    if (!vid) { showToast("Paste a valid YouTube link first!"); return; }
    var btn = document.getElementById("autofillBtn");
    var status = document.getElementById("ytStatus");
    btn.disabled = true; btn.textContent = "Reading…";
    status.textContent = "✨ Reading video details…"; status.classList.add("show");

    fetch("https://www.youtube.com/oembed?url=https://youtu.be/" + vid + "&format=json")
      .then(function(r) { return r.json(); })
      .then(function(yt) {
        return callGemini([{ text: 'You are a professional chef. Based on this YouTube recipe video title: "' + (yt.title||"") + '", provide accurate details. Think about what ingredients are typically used in this dish. Respond ONLY with valid JSON, no markdown, no extra text: {"name":"clean recipe name only","ingredients":"comprehensive comma separated ingredients list including spices and garnishes","category":"pick one: Chicken or Vegetarian or Dal / Lentils or Rice / Biryani or Bread / Roti or Dessert or Snack or Soup or Seafood or Other","cuisine":"pick one: Indian or Italian or Chinese or Mexican or Thai or Middle Eastern or Continental or Other"}' }]);
      })
      .then(function(data) {
        var parsed = parseGeminiJSON(data);
        if (Object.keys(parsed).length === 0) { status.textContent = "❌ Couldn't parse. Fill manually."; return; }
        fillForm(parsed);
        status.textContent = "✅ Fields filled — review and save!";
        showToast("Auto-filled! 🎉");
      })
      .catch(function(e) { status.textContent = "❌ Couldn't auto-fill. Fill manually."; console.error(e); })
      .finally(function() { btn.disabled = false; btn.textContent = "✨ Auto-fill"; });
  };

  // ── PHOTO SCAN ──
  window.onPhotoSelected = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    photoMime = file.type || "image/jpeg";
    var reader = new FileReader();
    reader.onload = function(ev) {
      photoBase64 = ev.target.result.split(",")[1];
      document.getElementById("photoPreviewImg").src = ev.target.result;
      document.getElementById("photoPreviewWrap").classList.add("show");
    };
    reader.readAsDataURL(file);
  };

  window.extractFromPhoto = function() {
    if (!photoBase64) return;
    var btn = document.getElementById("extractBtn");
    var status = document.getElementById("photoStatus");
    btn.disabled = true; btn.textContent = "✨ Reading recipe…";
    status.textContent = "✨ Reading the photo…"; status.classList.add("show");

    callGemini([
      { inline_data: { mime_type: photoMime, data: photoBase64 } },
      { text: 'This is a photo of a recipe (could be a cookbook page, handwritten note, or screenshot). Read ALL the text carefully and extract every detail. Respond ONLY with valid JSON, no markdown, no extra text: {"name":"exact recipe name from the photo","ingredients":"every ingredient exactly as written, comma separated","recipe":"all steps exactly as written, each step on a new line","category":"pick one: Chicken or Vegetarian or Dal / Lentils or Rice / Biryani or Bread / Roti or Dessert or Snack or Soup or Seafood or Other","cuisine":"pick one: Indian or Italian or Chinese or Mexican or Thai or Middle Eastern or Continental or Other"}' }
    ])
    .then(function(data) {
      var parsed = parseGeminiJSON(data);
      if (Object.keys(parsed).length === 0) { status.textContent = "❌ Couldn't read. Try a clearer image."; return; }
      fillForm(parsed);
      status.textContent = "✅ Recipe extracted — review and save!";
      showToast("Extracted from photo! 📷🎉");
    })
    .catch(function(e) { status.textContent = "❌ Couldn't read the photo. Try a clearer image."; console.error(e); })
    .finally(function() { btn.disabled = false; btn.textContent = "✨ Extract recipe from photo"; });
  };

  // ── SAVE ──
  window.saveRecipe = function() {
    var name = document.getElementById("fName").value.trim();
    var ytUrl = document.getElementById("fUrl").value.trim();
    var ingredients = document.getElementById("fIngredients").value.trim();
    var recipe = document.getElementById("fRecipe").value.trim();
    var category = document.getElementById("fCategory").value;
    var cuisine = document.getElementById("fCuisine").value;
    if (!name) { showToast("Add a recipe name first!"); return; }
    if (!window._saveToFirebase) { showToast("Still connecting…"); return; }
    var btn = document.getElementById("saveBtn");
    btn.disabled = true; btn.textContent = "Saving…";

    var user = window._currentUser;
    window._saveToFirebase({
      name: name, ytUrl: ytUrl||null, ytId: ytUrl ? getYTId(ytUrl) : null,
      ingredients: ingredients||null, recipe: recipe||null,
      category: category||null, cuisine: cuisine||null,
      addedBy: user ? user.uid : null,
      addedByName: user ? (user.displayName || user.email.split("@")[0]) : "Unknown",
      addedAt: Date.now()
    })
    .then(function() { closeModal('add'); showToast("Recipe saved! 🎉"); resetForm(); })
    .catch(function(e) { showToast("Error: " + e.message); })
    .finally(function() { btn.disabled = false; btn.textContent = "Save Recipe"; });
  };

  function resetForm() {
    ["fName","fUrl","fIngredients","fRecipe"].forEach(function(id){ document.getElementById(id).value=""; });
    document.getElementById("fCategory").value = "";
    document.getElementById("fCuisine").value = "";
    document.getElementById("urlPreview").classList.remove("show");
    document.getElementById("photoPreviewWrap").classList.remove("show");
    document.getElementById("ytStatus").classList.remove("show");
    document.getElementById("photoStatus").classList.remove("show");
    photoBase64 = null;
  }

  window.openModal = function(type) { document.getElementById(type + "Overlay").classList.add("open"); };
  window.closeModal = function(type) { document.getElementById(type + "Overlay").classList.remove("open"); };
  document.getElementById("addOverlay").addEventListener("click", function(e) { if (e.target === this) closeModal('add'); });
  document.getElementById("detailOverlay").addEventListener("click", function(e) { if (e.target === this) closeModal('detail'); });

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(function() { t.classList.remove("show"); }, 2500);
  }

  function esc(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
